name: Notify Slack on Issue
on:
  issues:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare Slack Message
        id: prep
        run: |
          BODY="${{ github.event.issue.body }}"
          echo "$BODY" | sed -n '1,/### 상세 내용/p' | sed '$d' > summary.txt
          if [ ! -s summary.txt ]; then
            echo "$BODY" > summary.txt
          fi
          
          echo "SUMMARY<<EOF" >> $GITHUB_OUTPUT
          cat summary.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        env:
          BODY: ${{ github.event.issue.body }}

      - name: Send Slack Notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "<@U0B2YNTBB0B> *${{ github.event.issue.title }}*\n\n${{ steps.prep.outputs.summary }}\n\n${{ github.event.issue.html_url }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
